<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Queen Music Player</title>

<style>

body{
    background:#111;
    text-align:center;
    margin:20px;
    font-family:Arial, Helvetica, sans-serif;
}

#band{
    width:750px;
    max-width:95%;
    border-radius:12px;
    box-shadow:0 0 25px rgba(255,255,255,0.25);
}

#btn{
    margin-top:20px;
    font-size:30px;
    padding:15px 50px;
    background:#c00000;
    color:white;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-weight:bold;
}

#status{
    color:white;
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
}

</style>
</head>

<body>

<img id="band" src="./muppetsqueen.jpg" alt="Queen Band">
<br>

<button id="btn" onclick="toggleMusic()">
PLAY MUSIC
</button>

<div id="status">
Ready To Rock!
</div>

<audio id="player"></audio>

<script>

const playlist = [

"https://files.happyfile.net/uploads/Queen_-_Bohemian_Rhapsody__Lyrics__2a02%3Aa456%3A2faa%3A0%3A843f%3A4c60%3A967e%3A2680_happyfile.net_ff6f3c11.mp3",

"https://files.happyfile.net/uploads/Queen_-_Don_t_Stop_Me_Now_2a02%3Aa456%3A2faa%3A0%3A843f%3A4c60%3A967e%3A2680_happyfile.net_9a06803b.mp3",

"https://files.happyfile.net/uploads/Queen_-_Somebody_To_Love_2a02%3Aa456%3A2faa%3A0%3A843f%3A4c60%3A967e%3A2680_happyfile.net_1041850e.mp3",

"https://files.happyfile.net/uploads/Queen_-_Another_One_Bites_the_Dust__Live__2a02%3Aa456%3A2faa%3A0%3A843f%3A4c60%3A967e%3A2680_happyfile.net_b626a836.mp3",

"https://files.happyfile.net/uploads/Queen_-_I_Want_to_Break_Free_2a02%3Aa456%3A2faa%3A0%3A843f%3A4c60%3A967e%3A2680_happyfile.net_adac7ee7.mp3",

"https://files.happyfile.net/uploads/Queen_-_Love_of_My_Life__Live_at_Wembley_Stadium___July_1986__2a02%3Aa456%3A2faa%3A0%3A843f%3A4c60%3A967e%3A2680_happyfile.net_f730128c.mp3",

"https://files.happyfile.net/uploads/Queen_-_Crazy_Little_Thing_Called_Love_2a02%3Aa456%3A2faa%3A0%3A843f%3A4c60%3A967e%3A2680_happyfile.net_a12dad74.mp3"

];

const trackNames = [

"Bohemian Rhapsody",

"Don't Stop Me Now",

"Somebody To Love",

"Another One Bites The Dust (Live)",

"I Want To Break Free",

"Love Of My Life (Wembley 1986)",

"Crazy Little Thing Called Love"

];

let current = 0;
let playing = false;

const player = document.getElementById("player");
const btn = document.getElementById("btn");
const status = document.getElementById("status");

function playTrack(index){

    player.src = playlist[index];
    player.play();

    status.innerHTML =
    "♪ NOW PLAYING: " + trackNames[index];
}

function toggleMusic(){

    if(!playing){

        if(player.src === ""){
            playTrack(current);
        }else{
            player.play();
        }

        btn.innerHTML = "STOP MUSIC";
        playing = true;

    }else{

        player.pause();

        btn.innerHTML = "PLAY MUSIC";
        status.innerHTML = "Music Paused";

        playing = false;
    }
}

player.addEventListener("ended", function(){

    current++;

    if(current >= playlist.length){
        current = 0;
    }

    playTrack(current);

});

</script>

</body>
</html>
